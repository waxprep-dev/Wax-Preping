version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: python -m app.worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wax
      POSTGRES_PASSWORD: wax
      POSTGRES_DB: waxprep
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
