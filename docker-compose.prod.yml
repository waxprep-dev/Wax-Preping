version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://wax:wax@postgres:5432/waxprep
      - REDIS_URL=redis://redis:6379
      # Add your other env vars here
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build: .
    command: python -m app.worker
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://wax:wax@postgres:5432/waxprep
      - REDIS_URL=redis://redis:6379
      # Add your other env vars here
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wax
      POSTGRES_PASSWORD: wax
      POSTGRES_DB: waxprep
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  redisdata:
